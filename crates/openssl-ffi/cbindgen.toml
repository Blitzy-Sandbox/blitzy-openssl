# =============================================================================
# cbindgen Configuration — OpenSSL FFI C Header Generation
# =============================================================================
#
# This configuration file controls how cbindgen transforms Rust FFI exports
# (from the openssl-ffi crate) into a C-compatible header file (openssl_ffi.h)
# that preserves the existing OpenSSL C ABI contract.
#
# The generated header enables existing C consumers to link against the Rust
# library exactly as they would against the original C libcrypto/libssl. All
# public API symbols (EVP_*, SSL_*, BIO_*, X509_*, CRYPTO_*, OSSL_*) are
# exported via #[no_mangle] pub extern "C" fn declarations in the FFI crate.
#
# Consumed by: crates/openssl-ffi/build.rs (via cbindgen::Config::from_file)
# cbindgen version: 0.29.2 (AAP §0.6.2)
#
# Key conventions derived from source OpenSSL headers:
#   - Include guard pattern: OPENSSL_*_H (types.h, evp.h, core.h, bio.h)
#   - Opaque types: typedef struct *_st TYPE; (include/openssl/types.h)
#   - Standard includes: <stddef.h>, <stdint.h>, <limits.h>
#   - C++ compatibility: #ifdef __cplusplus / extern "C" { / #endif
#   - Symbol prefixes: EVP_, SSL_, BIO_, X509_, CRYPTO_, OSSL_, ERR_
#
# AAP References: §0.4.1, §0.5.1, §0.7.8, §0.8.3
# =============================================================================

# =============================================================================
# Language Selection
# =============================================================================
# Generate C headers (not C++). This is mandatory for OpenSSL C ABI backward
# compatibility — existing C consumers must be able to #include the generated
# header and link against the Rust-produced shared library without modification.
# Per AAP §0.8.3: existing FFI consumers must continue to link and function.

language = "C"

# =============================================================================
# Header and Trailer Content
# =============================================================================
# Auto-generation notices embedded at the top and bottom of the generated
# header file. These follow standard practices for machine-generated code and
# warn maintainers not to edit the output directly.

header = """/* Auto-generated by cbindgen — DO NOT EDIT */
/* OpenSSL FFI compatibility layer generated from Rust sources */
/* See crates/openssl-ffi/ for the Rust implementation */"""

autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"

# =============================================================================
# Include Guard
# =============================================================================
# Traditional #ifndef include guard following the OpenSSL naming convention.
# All OpenSSL public headers use the OPENSSL_*_H pattern:
#   include/openssl/types.h  → OPENSSL_TYPES_H
#   include/openssl/evp.h    → OPENSSL_EVP_H
#   include/openssl/core.h   → OPENSSL_CORE_H
#   include/openssl/bio.h    → OPENSSL_BIO_H
# The generated FFI header follows the same convention: OPENSSL_FFI_H

include_guard = "OPENSSL_FFI_H"

# Use traditional include guards only (not #pragma once) for maximum
# portability across compilers. While OpenSSL headers do use #pragma once
# alongside include guards, the generated header relies solely on the
# traditional mechanism for broadest C compiler compatibility.
pragma_once = false

# Include the cbindgen version as a comment in the generated header for
# reproducibility and debugging purposes.
include_version = true

# =============================================================================
# Include Directives
# =============================================================================
# Disable automatic #include generation — we specify exact includes manually
# to match OpenSSL header conventions.

no_includes = true

# Required C standard library headers for the types used in FFI declarations:
#   stdint.h  — uint8_t, uint16_t, uint32_t, uint64_t, int32_t, int64_t, etc.
#               Used in buffer parameters, key sizes, algorithm constants.
#   stddef.h  — size_t, ptrdiff_t, NULL
#               Used universally for buffer lengths and pointer differences.
#               Matches include/openssl/core.h which includes <stddef.h>.
sys_includes = ["stdint.h", "stddef.h"]

# =============================================================================
# C++ Compatibility
# =============================================================================
# Enable automatic extern "C" { } wrapping so the generated C header can be
# safely included from C++ translation units. This matches the OpenSSL pattern:
#   #ifdef __cplusplus
#   extern "C" {
#   #endif
# cbindgen generates this wrapper automatically when cpp_compat = true and
# language = "C". No manual after_includes/trailer blocks are needed.

cpp_compat = true

# =============================================================================
# Formatting and Style
# =============================================================================

# Generate both tagged struct names AND typedef aliases:
#   typedef struct MyStruct { ... } MyStruct;
# This matches the OpenSSL C convention where opaque types have both
# a struct tag (struct evp_md_ctx_st) and a typedef alias (EVP_MD_CTX).
# Consumers can use either form.
style = "both"

# K&R brace style — opening brace on the same line as the declaration.
# Matches OpenSSL C source formatting conventions:
#   typedef struct evp_md_ctx_st {
#       int field;
#   } EVP_MD_CTX;
braces = "SameLine"

# 4-space indentation matching OpenSSL C coding style.
tab_width = 4

# Maximum line length for generated declarations.
line_length = 100

# Map Rust usize/isize to C size_t/ptrdiff_t respectively.
# OpenSSL universally uses size_t for buffer lengths, counts, and offsets
# (not uintptr_t). Setting this ensures the generated C header uses the
# same types as the original OpenSSL headers.
usize_is_size_t = true

# Preserve source order in generated output to maintain logical grouping
# of related declarations (e.g., EVP functions together, SSL functions
# together). This improves readability of the generated header.
sort_by = "None"

# =============================================================================
# Documentation
# =============================================================================

# Generate documentation comments from Rust /// doc comments.
# This ensures the C header carries API documentation for consumers.
documentation = true

# Use C-style block comments (/** ... */) for generated documentation.
# This format is compatible with Doxygen, which is the standard C/C++
# documentation generator, and matches conventions in OpenSSL source.
documentation_style = "c"

# =============================================================================
# Function Configuration
# =============================================================================

[fn]

# Preserve Rust argument names in C output without renaming.
# OpenSSL C functions use descriptive snake_case argument names
# (e.g., ctx, md, type, in_buf, out_buf, outlen) and the Rust FFI
# wrappers maintain identical parameter names for API compatibility.
rename_args = "None"

# Format function arguments vertically — one argument per line.
# This matches the OpenSSL C coding style for multi-parameter functions
# and improves readability for functions with many parameters (common
# in the EVP and SSL APIs). Example output:
#
#   int EVP_DigestInit_ex(
#       EVP_MD_CTX *ctx,
#       const EVP_MD *type,
#       ENGINE *impl
#   );
args = "Vertical"

# =============================================================================
# Struct Configuration
# =============================================================================

[struct]

# Preserve struct field names without renaming.
# OpenSSL struct fields consistently use snake_case naming.
rename_fields = "None"

# Generate equality comparison support for #[repr(C)] structs.
# This enables == comparisons in C for applicable struct types.
derive_eq = true

# Do not generate inequality or ordering comparisons.
# These are not part of the OpenSSL C ABI contract and would add
# unnecessary complexity to the generated header.
derive_neq = false
derive_lt = false
derive_lte = false
derive_gt = false
derive_gte = false

# =============================================================================
# Enum Configuration
# =============================================================================

[enum]

# Convert Rust enum variants to SCREAMING_SNAKE_CASE for C conventions.
# This transforms idiomatic Rust names into standard C constant names:
#   Rust:  SslError::WantRead  →  C:  SSL_ERROR_WANT_READ
#   Rust:  EvpPkeyType::Rsa    →  C:  EVP_PKEY_TYPE_RSA
rename_variants = "ScreamingSnakeCase"

# Prefix enum values with the type name to prevent C namespace collisions.
# C does not have enum scoping, so all enum values share the global namespace.
# Prefixing ensures uniqueness:
#   enum SslError { None, Ssl, WantRead, ... }
#   → SSL_ERROR_NONE, SSL_ERROR_SSL, SSL_ERROR_WANT_READ, ...
prefix_with_name = true

# =============================================================================
# Export Configuration
# =============================================================================

[export]

# No additional prefix for exported symbols. All FFI exports in the
# openssl-ffi crate already use OpenSSL-compatible naming conventions
# with established prefixes:
#   EVP_*      — src/evp.rs    (digest, cipher, pkey, kdf, mac, kem, rand)
#   SSL_*      — src/ssl.rs    (context, connection, session, method)
#   BIO_*      — src/bio.rs    (I/O abstraction: memory, file, socket, filter)
#   X509_*     — src/x509.rs   (certificate, store, name, CRL)
#   CRYPTO_*   — src/crypto.rs (initialization, memory, thread, provider)
#   OSSL_*     — src/crypto.rs (library context, provider, params)
#   ERR_*      — src/crypto.rs (error stack operations)
prefix = ""

# Include all exports by default — do not restrict by name.
# All #[no_mangle] pub extern "C" fn symbols and #[repr(C)] types
# should appear in the generated header.
include = []

# No exclusions — all properly annotated FFI symbols are exported.
exclude = []

# Export all item types to ensure complete C ABI coverage.
# This includes:
#   constants  — #define equivalents from const declarations
#   globals    — Global static variables (if any)
#   enums      — C enum definitions from Rust enums
#   structs    — C struct definitions from #[repr(C)] structs
#   unions     — C union definitions from #[repr(C)] unions
#   typedefs   — Type aliases
#   opaque     — Opaque pointer types (struct forward declarations)
#   functions  — Function declarations from extern "C" fn exports
item_types = ["constants", "globals", "enums", "structs", "unions", "typedefs", "opaque", "functions"]

# =============================================================================
# Parse Configuration
# =============================================================================

[parse]

# Parse workspace dependency crates to resolve cross-crate type definitions.
# The FFI crate re-exports types that are defined in other workspace crates.
# Without parsing dependencies, cbindgen cannot resolve type references and
# would either emit incomplete definitions or fail entirely.
parse_deps = true

# Workspace crates to include in type resolution during parsing.
# These are the crates whose types appear in FFI function signatures:
#
#   openssl-common  — Shared foundation types: error codes, parameter types,
#                     configuration structs, time types. Provides common
#                     definitions used across all FFI modules.
#
#   openssl-crypto  — libcrypto types: EVP_MD, EVP_CIPHER, EVP_PKEY, BIO,
#                     X509, BigNum, ASN.1, RAND, KDF, MAC, EC, RSA, DSA, DH,
#                     PQC types. The majority of FFI wrappers translate these.
#
#   openssl-ssl     — libssl types: SSL, SSL_CTX, SSL_SESSION, SSL_METHOD,
#                     QUIC types. SSL-related FFI wrappers translate these.
include = ["openssl-common", "openssl-crypto", "openssl-ssl"]

# =============================================================================
# Macro Expansion
# =============================================================================
# Expand macros in the FFI crate itself to ensure derive macros (e.g.,
# #[derive(Debug, Clone)] on #[repr(C)] types) and other procedural macros
# are fully resolved before cbindgen parses the source.

[parse.expand]
crates = ["openssl-ffi"]
